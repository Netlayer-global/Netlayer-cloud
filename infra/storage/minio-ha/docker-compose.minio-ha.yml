services:
  # 4-node MinIO distributed cluster (the smallest config that survives a
  # single-node failure with erasure coding on). Production should put each
  # node on a separate physical host and front them with HAProxy or a real
  # network load balancer; this compose file is enough for staging.
  minio1:
    image: minio/minio:RELEASE.2025-03-12T18-04-18Z
    container_name: minio1
    hostname: minio1
    networks: [minio-net]
    volumes: ['data1:/data1', 'data2:/data2']
    expose: ['9000', '9001']
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_PROMETHEUS_AUTH_TYPE: public
    command: 'server --console-address ":9001" http://minio{1...4}/data{1...2}'
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  minio2:
    extends: { service: minio1 }
    container_name: minio2
    hostname: minio2
    volumes: ['data3:/data1', 'data4:/data2']

  minio3:
    extends: { service: minio1 }
    container_name: minio3
    hostname: minio3
    volumes: ['data5:/data1', 'data6:/data2']

  minio4:
    extends: { service: minio1 }
    container_name: minio4
    hostname: minio4
    volumes: ['data7:/data1', 'data8:/data2']

  # nginx in front of all four MinIO nodes — round-robin LB, single S3 endpoint
  minio-lb:
    image: nginx:1.27-alpine
    container_name: minio-lb
    networks: [minio-net]
    ports:
      - '9000:9000'   # S3 API
      - '9001:9001'   # Web console
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on: [minio1, minio2, minio3, minio4]
    restart: unless-stopped

networks:
  minio-net:

volumes:
  data1:
  data2:
  data3:
  data4:
  data5:
  data6:
  data7:
  data8:
