!
! NetLayer leaf-switch FRR configuration template.
!
! Replace placeholders before applying:
!   <ASN>           — leaf BGP autonomous system number (e.g. 65101)
!   <SPINE_ASN>     — spine ASN (e.g. 65000)
!   <ROUTER_ID>     — leaf router-id, the loopback IP
!   <LOOPBACK_IP>   — loopback IP for VTEP source
!   <SPINE_IP_*>    — spine peer IPs
!
! Bridge type: VXLAN-EVPN with symmetric IRB. This is the production-grade
! pattern for tenant network isolation across NetLayer compute hosts.
!
hostname leaf01
!
log syslog informational
!
debug bgp updates
!
ip router-id <ROUTER_ID>
!
interface lo
 ip address <LOOPBACK_IP>/32
!
router bgp <ASN>
 bgp router-id <ROUTER_ID>
 no bgp ebgp-requires-policy
 neighbor SPINE peer-group
 neighbor SPINE remote-as <SPINE_ASN>
 neighbor SPINE timers 3 9
 neighbor <SPINE_IP_1> peer-group SPINE
 neighbor <SPINE_IP_2> peer-group SPINE
 !
 address-family ipv4 unicast
  network <LOOPBACK_IP>/32
  neighbor SPINE activate
 exit-address-family
 !
 address-family l2vpn evpn
  neighbor SPINE activate
  advertise-all-vni
 exit-address-family
!
end
