# NetLayer Cloud — frontend nginx config
#
# Serves the Vite SPA, transparently proxies /api and /docs to the backend
# container, and proxies the Socket.io upgrade for realtime events.
#
# History API fallback: any non-asset request returns index.html so React
# Router can resolve client-side routes on hard refresh.

server {
  listen 80 default_server;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Hardening
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

  # Long cache for hashed assets
  location ~* \.(?:css|js|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp|avif)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Backend API
  location /api/ {
    proxy_pass http://backend:5000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
    client_max_body_size 25m;  # raise for ISO + qcow2 uploads
  }

  # Swagger docs
  location /docs {
    proxy_pass http://backend:5000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  # OpenAPI spec
  location = /api/openapi.json {
    proxy_pass http://backend:5000/api/openapi.json;
  }

  # Socket.io realtime
  location /socket.io/ {
    proxy_pass http://backend:5000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 86400s;
  }

  # Healthz passthrough for orchestrator probes
  location = /healthz {
    proxy_pass http://backend:5000/healthz;
    access_log off;
  }

  # SPA routing — every non-asset, non-proxy URL returns index.html
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache" always;
  }
}
