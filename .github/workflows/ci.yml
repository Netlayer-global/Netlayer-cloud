name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (typecheck + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        working-directory: backend
        run: npm ci
      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate
      - name: Type-check
        working-directory: backend
        run: npx tsc --noEmit
      - name: Test
        working-directory: backend
        run: npm test
        env:
          DATABASE_URL: file:./test.db
          JWT_SECRET: ci-test-jwt-secret-min-16-chars
          JWT_REFRESH_SECRET: ci-test-refresh-secret-min-16-chars
          PROXMOX_MOCK_MODE: 'true'
          CLOUDFLARE_MOCK_MODE: 'true'
          GRAFANA_MOCK_MODE: 'true'
          ZABBIX_MOCK_MODE: 'true'
          MINIO_MOCK_MODE: 'true'

  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Type-check
        working-directory: frontend
        run: npx tsc --noEmit
      - name: Build
        working-directory: frontend
        run: npm run build

  cli:
    name: CLI (typecheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        working-directory: cli
        run: npm install
      - name: Type-check
        working-directory: cli
        run: npx tsc --noEmit
      - name: Build
        working-directory: cli
        run: npm run build

  terraform-provider:
    name: Terraform provider (build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: '1.21'
      - name: go mod tidy
        working-directory: terraform-provider-netlayer
        run: go mod tidy
      - name: go vet
        working-directory: terraform-provider-netlayer
        run: go vet ./...
      - name: Build
        working-directory: terraform-provider-netlayer
        run: go build -o terraform-provider-netlayer
