<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0d0e0d" />

    <!-- Premium brand type system: Clash Display (geometric display, matches
         the NetLayer logo) + Satoshi (geometric body) from Fontshare, plus
         JetBrains Mono for genuine tabular numerals (ticker / dashboard). -->
    <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
    <link
      href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&f[]=satoshi@400,500,700,900&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&display=swap"
      rel="stylesheet"
    />

    <!-- Primary meta -->
    <title>NetLayer Cloud — Cloud infrastructure that deploys in seconds</title>
    <meta
      name="description"
      content="High-performance cloud VPS, bare metal, and GPU servers on a global KVM platform. Per-second billing, a developer-first API, and flat pricing across 15 regions."
    />
    <meta name="keywords" content="cloud hosting, VPS, bare metal, GPU cloud, kubernetes, object storage, India cloud, KVM, developer cloud" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="NetLayer Cloud" />
    <meta property="og:title" content="NetLayer Cloud — Cloud infrastructure that deploys in seconds" />
    <meta
      property="og:description"
      content="Spin up cloud VPS, bare metal, and GPU servers across 15 regions. Per-second billing and a developer-first API."
    />
    <meta property="og:url" content="https://netlayer.cloud/" />
    <meta property="og:image" content="/favicon.svg" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="NetLayer Cloud — Cloud infrastructure that deploys in seconds" />
    <meta
      name="twitter:description"
      content="High-performance cloud VPS, bare metal, and GPU servers across 15 regions. Built for developers."
    />
    <meta name="twitter:image" content="/favicon.svg" />

    <link rel="canonical" href="https://netlayer.cloud/" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
